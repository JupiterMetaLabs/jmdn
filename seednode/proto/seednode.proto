syntax = "proto3";

package peerpb;

option go_package = "seedNodes/api/peer;peerpb";

import "google/protobuf/empty.proto";

// Peer status enumeration
enum PeerStatus {
  PEER_STATUS_INACTIVE = 0;  // 0 = inactive
  PEER_STATUS_ACTIVE = 1;    // 1 = active
}

// Signed peer record message
message SignedPeerRecord {
  string peer_id = 1;                    // libp2p PeerID
  repeated string multiaddrs = 2;        // Network addresses
  uint64 seq = 3;                        // Sequence number
  PeerStatus current_status = 4;
  map<string, string> labels = 5;        // Metadata labels
  string region = 6;                     // Geographic region (e.g., "US-CA", "EU-DE")
  string v = 7;                          // Signature V component
  string r = 8;                          // Signature R component
  string s = 9;                          // Signature S component
  // Timestamps (auto-generated, only in responses)
  int64 first_created = 10;              // When this peer first registered (Unix epoch)
  int64 last_updated = 11;               // Last update timestamp (Unix epoch)
  int64 active_from = 12;                // When this record became active (Unix epoch)
  float weights = 13;                    // Peer weight value (auto-generated, only in responses)
}

// Peer record update message
message PeerRecordUpdate {
  string peer_id = 1;
  uint64 seq = 2;
  repeated string multiaddrs = 3;
  PeerStatus status = 4;
  repeated string neighbors = 5;
  map<string, string> labels = 6;
  string region = 7;                     // Geographic region (e.g., "US-CA", "EU-DE")
  float weights = 8;                     // Peer weight value
  string v = 9;                          // Signature V component
  string r = 10;                         // Signature R component
  string s = 11;                         // Signature S component
}

// Heartbeat message
message HeartbeatMessage {
  string peer_id = 1;
  PeerStatus status = 2;
  repeated string multiaddrs = 3;
  string v = 4;                          // Signature V component
  string r = 5;                          // Signature R component
  string s = 6;                          // Signature S component
}

// Peer neighbor relationship
message PeerNeighbor {
  string peer_id = 1;                    // Source peer ID
  string neighbor_id = 2;                // Target neighbor ID
  int64 created_at = 3;                  // When relationship was established
  int64 last_seen = 4;                   // Last time neighbor was seen active
  bool is_active = 5;                    // Current active status
  string v = 6;                          // Signature V component
  string r = 7;                          // Signature R component
  string s = 8;                          // Signature S component
}

// Inactive neighbor report
message InactiveNeighborReport {
  string reporter_peer_id = 1;           // Peer reporting the inactive neighbor
  string subject_peer_id = 2;            // Peer reported as inactive
  int64 last_seen_timestamp = 3;         // When reporter last saw subject active
  string reason = 4;                     // Reason for reporting (e.g., "missed_heartbeats")
  int64 reported_at = 5;                 // When this report was made
  int32 missed_heartbeat_count = 6;      // Number of consecutive missed heartbeats
  string v = 7;                          // Signature V component
  string r = 8;                          // Signature R component
  string s = 9;                          // Signature S component
}

// Peer alias message
message PeerAlias {
  string name = 1;
  string peer_id = 2;
  string v = 3;                          // Signature V component
  string r = 4;                          // Signature R component
  string s = 5;                          // Signature S component
  // Timestamps (auto-generated, only in responses)
  int64 created = 6;                     // When alias was created (Unix epoch)
  int64 last_updated = 7;                // Last update timestamp (Unix epoch)
}

// Request/Response messages
message RegisterPeerRequest {
  SignedPeerRecord peer_record = 1;
  repeated string neighbors = 2;           // Initial neighbors to add
}

message RegisterPeerResponse {
  bool accepted = 1;
  string message = 2;
}

message UpdatePeerRequest {
  PeerRecordUpdate update = 1;
}

message UpdatePeerResponse {
  bool accepted = 1;
  string message = 2;
}

message GetPeerRequest {
  string peer_id = 1;
}

message GetPeerResponse {
  SignedPeerRecord peer_record = 1;
  PeerAlias alias = 2;
  bool found = 3;
}

message CreateAliasRequest {
  PeerAlias alias = 1;
}

message CreateAliasResponse {
  bool accepted = 1;
  string message = 2;
}

message GetPeerByAliasRequest {
  string alias = 1;
}

message GetPeerByAliasResponse {
  SignedPeerRecord peer_record = 1;
  PeerAlias alias = 2;
  bool found = 3;
}

message PeerListRequest {
  string after_peer_id = 1;
  int32 limit = 2;
  PeerStatus status = 3;
  map<string, string> labels = 4;
}

message PeerListResponse {
  repeated SignedPeerRecord peers = 1;
  string last = 2;
  bool has_more = 3;
}

message SendHeartbeatRequest {
  HeartbeatMessage heartbeat = 1;
}

message SendHeartbeatResponse {
  bool accepted = 1;
  string message = 2;
}

message DeleteAliasRequest {
  string alias = 1;
  string peer_id = 2;    // Required for ownership verification
  string v = 3;          // Signature V component
  string r = 4;          // Signature R component  
  string s = 5;          // Signature S component
}

message DeleteAliasResponse {
  bool accepted = 1;
  string message = 2;
}

message DeletePeerRequest {
  string peer_id = 1;
}

message DeletePeerResponse {
  bool accepted = 1;
  string message = 2;
}


message RegisterPeerWithAliasRequest {
  SignedPeerRecord peer_record = 1;
  PeerAlias alias = 2;
  repeated string neighbors = 3;           // Initial neighbors to add
}

message RegisterPeerWithAliasResponse {
  bool accepted = 1;
  string message = 2;
}

// Update peer weights request/response
message UpdatePeerWeightsRequest {
  string peer_id = 1;
  float weights = 2;
  string v = 3;                          // Signature V component
  string r = 4;                          // Signature R component
  string s = 5;                          // Signature S component
}

message UpdatePeerWeightsResponse {
  bool accepted = 1;
  string message = 2;
}

message ReportInactiveNeighborRequest {
  InactiveNeighborReport report = 1;
}

message ReportInactiveNeighborResponse {
  bool accepted = 1;
  string message = 2;
  int32 report_count = 3;                 // Total reports for this subject peer
}

message AddNeighborRequest {
  PeerNeighbor neighbor = 1;
}

message AddNeighborResponse {
  bool accepted = 1;
  string message = 2;
}

message RemoveNeighborRequest {
  string peer_id = 1;
  string neighbor_id = 2;
  string v = 3;                          // Signature V component
  string r = 4;                          // Signature R component
  string s = 5;                          // Signature S component
}

message RemoveNeighborResponse {
  bool accepted = 1;
  string message = 2;
}

message GetNeighborsRequest {
  string peer_id = 1;
}

message GetNeighborsResponse {
  repeated PeerNeighbor neighbors = 1;
  bool found = 2;
}

message AllocateNeighborsRequest {
  string peer_id = 1;
  bool force_refresh = 2; // If true, allocate new neighbors even if existing ones exist
}

message AllocateNeighborsResponse {
  repeated PeerNeighbor neighbors = 1;
  bool allocated = 2; // True if new neighbors were allocated
  string message = 3;
}

message HealthCheckRequest {
  string peer_id = 1;
  repeated string multiaddrs = 2;
}

message HealthCheckResponse {
  bool is_healthy = 1;
  string message = 2;
  int64 checked_at = 3;
}

// Response containing this node's addresses and peer ID
message GetSelfAddressResponse {
  repeated string addresses = 1;
  string peer_id = 2;
}

message GetInactiveNeighborReportsForSubjectRequest {
  string subject_peer_id = 1;
}

message GetInactiveNeighborReportsForSubjectResponse {
  repeated InactiveNeighborReport reports = 1;
  bool found = 2;
}

// Buddy management messages
message UpdateBuddyRequest {
  repeated string peer_ids = 1;
}

message UpdateBuddyResponse {
  bool accepted = 1;
  string message = 2;
  int32 added_count = 3;
  int32 removed_count = 4;
}

message ListBuddyRequest {
  // Empty request - lists all peers excluding recent buddies
}

// Simplified buddy peer record
message BuddyPeerRecord {
  string peer_id = 1;
  repeated string multiaddrs = 2;
  string region = 3;
  string alias = 4;
  int64 first_created = 5;
  int64 last_updated = 6;
  int64 active_from = 7;
  float weights = 8;
}

message ListBuddyResponse {
  repeated BuddyPeerRecord peers = 1;
  int32 total_count = 2;
}

message RemoveBuddyRequest {
  string peer_id = 1;
}

message RemoveBuddyResponse {
  bool accepted = 1;
  string message = 2;
  bool removed = 3;
}

message RemoveAllBuddiesRequest {
  // Empty request - removes all buddies
}

message RemoveAllBuddiesResponse {
  bool accepted = 1;
  string message = 2;
  int64 removed_count = 3;
}

// Peer Directory Service
service PeerDirectory {
  rpc RegisterPeer(RegisterPeerRequest) returns (RegisterPeerResponse);
  rpc RegisterPeerWithAlias(RegisterPeerWithAliasRequest) returns (RegisterPeerWithAliasResponse);
  rpc UpdatePeer(UpdatePeerRequest) returns (UpdatePeerResponse);
  rpc UpdatePeerWeights(UpdatePeerWeightsRequest) returns (UpdatePeerWeightsResponse);
  rpc GetPeer(GetPeerRequest) returns (GetPeerResponse);
  rpc CreateAlias(CreateAliasRequest) returns (CreateAliasResponse);
  rpc GetPeerByAlias(GetPeerByAliasRequest) returns (GetPeerByAliasResponse);
  rpc ListPeers(PeerListRequest) returns (PeerListResponse);
  rpc SendHeartbeat(SendHeartbeatRequest) returns (SendHeartbeatResponse);
  rpc DeleteAlias(DeleteAliasRequest) returns (DeleteAliasResponse);
  rpc DeletePeer(DeletePeerRequest) returns (DeletePeerResponse);
  rpc HealthCheck(google.protobuf.Empty) returns (google.protobuf.Empty);
  
  // Self address of the running PeerDirectory node
  rpc GetSelfAddress(google.protobuf.Empty) returns (GetSelfAddressResponse);
  
  // Neighbor management
  rpc AddNeighbor(AddNeighborRequest) returns (AddNeighborResponse);
  rpc RemoveNeighbor(RemoveNeighborRequest) returns (RemoveNeighborResponse);
  rpc GetNeighbors(GetNeighborsRequest) returns (GetNeighborsResponse);
  rpc AllocateNeighbors(AllocateNeighborsRequest) returns (AllocateNeighborsResponse);
  
  // Inactive neighbor reporting
  rpc ReportInactiveNeighbor(ReportInactiveNeighborRequest) returns (ReportInactiveNeighborResponse);
  
  // Health check for specific peers
  rpc CheckPeerHealth(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetInactiveNeighborReportsForSubject(GetInactiveNeighborReportsForSubjectRequest) returns (GetInactiveNeighborReportsForSubjectResponse);
  
  // Buddy management
  rpc UpdateBuddy(UpdateBuddyRequest) returns (UpdateBuddyResponse);
  rpc ListBuddy(ListBuddyRequest) returns (ListBuddyResponse);
  rpc RemoveBuddy(RemoveBuddyRequest) returns (RemoveBuddyResponse);
  rpc RemoveAllBuddies(RemoveAllBuddiesRequest) returns (RemoveAllBuddiesResponse);
}