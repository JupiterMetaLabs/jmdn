syntax = "proto3";

package cli;

option go_package = "./proto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Peer information
message Peer {
    string id = 1;
    string multiaddr = 2;
    int32 heartbeat_fail = 3;
    bool is_alive = 4;
    string status = 5;
    string last_seen = 6;
}

message PeerList {
    repeated Peer peers = 1;
}

// Message statistics
message MessageStats {
    int64 messages_sent = 1;
    int64 messages_received = 2;
    int64 messages_failed = 3;
}

// Database state
message DatabaseState {
    uint64 tx_id = 1;
    bytes tx_hash = 2;
    string database = 3;
}

// DID Document
message DIDDocument {
    string did = 1;
    string public_key = 2;
    string balance = 3;
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp updated_at = 5;
}

// Sync statistics
message SyncStats {
    int64 time_taken = 1;
    DatabaseState main_state = 2;
    DatabaseState accounts_state = 3;
    string error = 4;
}

message Addrs {
    int32 total = 1;
    repeated string peers = 2;
    string error = 3;
}

// Service definition
service CLIService {
    // Peer management
    rpc ListPeers(google.protobuf.Empty) returns (PeerList) {}
    rpc AddPeer(PeerRequest) returns (OperationResponse) {}
    rpc RemovePeer(PeerRequest) returns (OperationResponse) {}
    rpc CleanPeers(google.protobuf.Empty) returns (CleanPeersResponse) {}

    // Messaging
    rpc SendMessage(MessageRequest) returns (OperationResponse) {}
    rpc SendYggdrasilMessage(MessageRequest) returns (OperationResponse) {}
    rpc SendFile(FileRequest) returns (OperationResponse) {}
    rpc BroadcastMessage(MessageRequest) returns (OperationResponse) {}
    rpc GetMessageStats(google.protobuf.Empty) returns (MessageStats) {}

    // DID Operations
    rpc GetDID(DIDRequest) returns (DIDDocument) {}

    // Database Operations
    rpc FastSync(PeerRequest) returns (SyncStats) {}
    rpc GetDatabaseState(google.protobuf.Empty) returns (DatabaseStates) {}

    // Addrs
    rpc ReturnAddrs(google.protobuf.Empty) returns (Addrs) {}
}

// Request/Response messages
message PeerRequest {
    string peer = 1;
}

message MessageRequest {
    string target = 1;
    string message = 2;
}

message FileRequest {
    string peer = 1;
    string filepath = 2;
    string remote_filename = 3;
}

message DIDRequest {
    string did = 1;
}

message OperationResponse {
    bool success = 1;
    string message = 2;
}

message CleanPeersResponse {
    int32 cleaned_count = 1;
    string error = 2;
}

message DatabaseStates {
    DatabaseState main_db = 1;
    DatabaseState accounts_db = 2;
}