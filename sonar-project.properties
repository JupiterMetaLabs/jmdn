# === Project Identity ===
sonar.projectKey=jmdn-project
sonar.projectName=JMDN - JMDT Decentralized Node
sonar.projectVersion=1.0.0

# === Source Configuration ===
sonar.sources=.
sonar.language=go

# === Exclusions — generated protobuf code, scripts, docs ===
sonar.exclusions=**/*.pb.go, **/*_grpc.pb.go, **/vendor/**, Scripts/**, docs/**, grafana/**

# === Test Configuration ===
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# === Coverage (requires: go test ./... -coverprofile=cover.out -covermode=atomic) ===
sonar.go.coverage.reportPaths=cover.out

# === Duplication — exclude generated code ===
sonar.cpd.exclusions=**/*.pb.go, **/*_grpc.pb.go

# === Encoding ===
sonar.sourceEncoding=UTF-8
