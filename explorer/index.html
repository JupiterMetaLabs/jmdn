<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMDT Blockchain Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #4a5568;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #4a5568;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .stat-card .value {
            color: #2d3748;
            font-size: 2rem;
            font-weight: bold;
        }

        .nav-tabs {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .tab-button:hover {
            background: #5a67d8;
        }

        .tab-button.active {
            background: #4c51bf;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .data-table {
            width: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table th {
            background: #f7fafc;
            font-weight: 600;
            color: #4a5568;
        }

        .data-table tr:hover {
            background: #f7fafc;
        }

        .address-link {
            color: #667eea;
            text-decoration: none;
            font-family: monospace;
        }

        .address-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .pagination button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #c6f6d5;
            color: #2f855a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .tab-buttons {
                flex-direction: column;
            }
            
            .data-table {
                font-size: 0.9rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 JMDT Blockchain Explorer</h1>
            <p>Explore addresses, balances, transactions, and blocks on the JMDT network</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Total Blocks</h3>
                <div class="value" id="totalBlocks">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Transactions</h3>
                <div class="value" id="totalTransactions">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Addresses</h3>
                <div class="value" id="totalAddresses">-</div>
            </div>
            <div class="stat-card">
                <h3>Latest Block</h3>
                <div class="value" id="latestBlock">-</div>
            </div>
        </div>

        <div class="nav-tabs">
            <div class="tab-buttons">
                <button class="tab-button active" onclick="showTab(event, 'addresses')">Addresses</button>
                <button class="tab-button" onclick="showTab(event, 'transactions')">Transactions</button>
                <button class="tab-button" onclick="showTab(event, 'blocks')">Blocks</button>
            </div>

            <div id="addresses" class="tab-content active">
                <input type="text" class="search-box" id="addressSearch" placeholder="Search addresses...">
                <div id="addressesTable"></div>
            </div>

            <div id="transactions" class="tab-content">
                <input type="text" class="search-box" id="transactionSearch" placeholder="Search transactions...">
                <div id="transactionsTable"></div>
            </div>

            <div id="blocks" class="tab-content">
                <input type="text" class="search-box" id="blockSearch" placeholder="Search blocks...">
                <div id="blocksTable"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentPage = {
            addresses: 1,
            transactions: 1,
            blocks: 1
        };

        // Load initial data
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadAddresses();
        });

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats/`);
                const stats = await response.json();
                
                document.getElementById('totalBlocks').textContent = stats.TotalBlocks || 0;
                document.getElementById('totalTransactions').textContent = stats.TotalTransactions || 0;
                document.getElementById('totalAddresses').textContent = stats.TotalAddresses || 0;
                document.getElementById('latestBlock').textContent = stats.LatestBlockNumber || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadAddresses(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/addresses/?page=${page}&limit=20`);
                const data = await response.json();
                
                const tableHtml = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Address</th>
                                <th>Balance (JMDT)</th>
                                <th>Nonce</th>
                                <th>Type</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.addresses.map(addr => `
                                <tr>
                                    <td><a href="#" class="address-link" onclick="showAddressDetails('${addr.address}')">${addr.address}</a></td>
                                    <td>${weiToEth(addr.balance)} JMDT</td>
                                    <td>${addr.nonce}</td>
                                    <td>${addr.account_type || 'N/A'}</td>
                                    <td>${new Date(addr.created_at * 1000).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button onclick="loadAddresses(${page - 1})" ${page <= 1 ? 'disabled' : ''}>Previous</button>
                        <span>Page ${page} of ${data.pagination.total_pages}</span>
                        <button onclick="loadAddresses(${page + 1})" ${page >= data.pagination.total_pages ? 'disabled' : ''}>Next</button>
                    </div>
                `;
                
                document.getElementById('addressesTable').innerHTML = tableHtml;
                currentPage.addresses = page;
            } catch (error) {
                console.error('Error loading addresses:', error);
                document.getElementById('addressesTable').innerHTML = '<div class="error">Error loading addresses</div>';
            }
        }

        async function loadTransactions(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/block/transactions/all?page=${page}&limit=20`);
                const data = await response.json();

                // Normalize transactions list across possible response shapes
                const transactions = Array.isArray(data.transactions)
                    ? data.transactions
                    : (Array.isArray(data.data) ? data.data : (Array.isArray(data.items) ? data.items : []));

                // Normalize pagination fields
                const pagination = data.pagination || {};
                const totalPages = pagination.totalPages || pagination.total_pages || data.total_pages || data.totalPages || 1;
                const current = page || pagination.current_page || pagination.page || 1;

                const rowsHtml = transactions.map(tx => {
                    const hash = tx.hash || tx.txHash || tx.tx_hash || '';
                    const fromAddr = tx.from || tx.from_address || '';
                    const toAddr = tx.to || tx.to_address || '';
                    const valueStr = tx.value !== undefined && tx.value !== null ? String(tx.value) : '0';
                    const blockNum = tx.blockNumber || tx.block_number || tx.block || tx.blocknumber || 'N/A';
                    return `
                                <tr>
                                    <td><a href="#" class="address-link" onclick="showTransactionDetails('${hash}')">${hash ? hash.substring(0, 20) + '...' : 'N/A'}</a></td>
                                    <td>${fromAddr}</td>
                                    <td>${toAddr}</td>
                                    <td>${weiToEth(valueStr)} JMDT</td>
                                    <td>${blockNum}</td>
                                </tr>`;
                }).join('');

                const tableHtml = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Hash</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Value (JMDT)</th>
                                <th>Block</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHtml || `<tr><td colspan="5">No transactions found</td></tr>`}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button onclick="loadTransactions(${current - 1})" ${current <= 1 ? 'disabled' : ''}>Previous</button>
                        <span>Page ${current} of ${totalPages}</span>
                        <button onclick="loadTransactions(${current + 1})" ${current >= totalPages ? 'disabled' : ''}>Next</button>
                    </div>
                `;

                document.getElementById('transactionsTable').innerHTML = tableHtml;
                currentPage.transactions = current;
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionsTable').innerHTML = '<div class="error">Error loading transactions</div>';
            }
        }

        async function loadBlocks(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/block/all?page=${page}&limit=20`);
                const data = await response.json();
                
                const tableHtml = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Number</th>
                                <th>Hash</th>
                                <th>Transactions</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(block => `
                                <tr>
                                    <td><a href="#" class="address-link" onclick="showBlockDetails(${block.blocknumber || block.Number})">${block.blocknumber || block.Number}</a></td>
                                    <td>${(block.blockhash || block.Hash || '').substring(0, 20)}...</td>
                                    <td>${block.transactions ? block.transactions.length : (block.Transactions ? block.Transactions.length : 0)}</td>
                                    <td>${new Date((block.timestamp || block.Timestamp) * 1000).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="pagination">
                        <button onclick="loadBlocks(${page - 1})" ${page <= 1 ? 'disabled' : ''}>Previous</button>
                        <span>Page ${page} of ${data.pagination.total_pages}</span>
                        <button onclick="loadBlocks(${page + 1})" ${page >= data.pagination.total_pages ? 'disabled' : ''}>Next</button>
                    </div>
                `;
                
                document.getElementById('blocksTable').innerHTML = tableHtml;
                currentPage.blocks = page;
            } catch (error) {
                console.error('Error loading blocks:', error);
                document.getElementById('blocksTable').innerHTML = '<div class="error">Error loading blocks</div>';
            }
        }

        function showTab(evt, tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked button
            if (evt && evt.target) {
                evt.target.classList.add('active');
            }
            
            // Load data for the tab if not already loaded
            if (tabName === 'transactions' && !document.getElementById('transactionsTable').innerHTML) {
                loadTransactions();
            } else if (tabName === 'blocks' && !document.getElementById('blocksTable').innerHTML) {
                loadBlocks();
            }
        }

        // Convert WEI to ETH
        function weiToEth(wei) {
            if (!wei || wei === '0') return '0';
            
            const weiBigInt = BigInt(wei);
            const divisor = BigInt(10**18);
            const ethBigInt = weiBigInt / divisor;
            const remainder = weiBigInt % divisor;
            
            if (remainder === 0n) {
                return ethBigInt.toString();
            } else {
                // Convert remainder to string and ensure it has exactly 18 digits
                let remainderStr = remainder.toString();
                
                // Pad with leading zeros to make it exactly 18 digits
                while (remainderStr.length < 18) {
                    remainderStr = '0' + remainderStr;
                }
                
                // Remove trailing zeros from the decimal part
                const trimmedRemainder = remainderStr.replace(/0+$/, '');
                
                if (trimmedRemainder === '') {
                    return ethBigInt.toString();
                } else {
                    return ethBigInt.toString() + '.' + trimmedRemainder;
                }
            }
        }

        function showAddressDetails(address) {
            fetch(`${API_BASE}/addresses/${address}`)
                .then(response => response.json())
                .then(data => {
                    const details = `
Address Details:
================
Address: ${data.address}
Balance: ${weiToEth(data.balance)} JMDT
Nonce: ${data.nonce}
Account Type: ${data.account_type}
DID Address: ${data.did_address || 'N/A'}
Transaction Count: ${data.transaction_count}
Created: ${new Date(data.created_at * 1000).toLocaleString()}
Updated: ${new Date(data.updated_at * 1000).toLocaleString()}
                    `;
                    alert(details);
                })
                .catch(error => {
                    console.error('Error fetching address details:', error);
                    alert('Error loading address details');
                });
        }

        function showTransactionDetails(hash) {
            fetch(`${API_BASE}/block/transactions/${hash}`)
                .then(response => response.json())
                .then(data => {
                    const details = `
Transaction Details:
===================
Hash: ${data.hash}
From: ${data.from}
To: ${data.to}
Value: ${weiToEth(data.value.toString())} JMDT
Gas Limit: ${data.gas_limit}
Gas Price: ${data.gas_price}
Nonce: ${data.nonce}
Block Number: ${data.blockNumber || 'N/A'}
Timestamp: ${new Date(data.timestamp * 1000).toLocaleString()}
Chain ID: ${data.chain_id}
                    `;
                    alert(details);
                })
                .catch(error => {
                    console.error('Error fetching transaction details:', error);
                    alert('Error loading transaction details');
                });
        }

        function showBlockDetails(blockNumber) {
            fetch(`${API_BASE}/block/number/${blockNumber}`)
                .then(response => response.json())
                .then(data => {
                    const details = `
Block Details:
==============
Block Number: ${data.blocknumber || data.Number}
Block Hash: ${data.blockhash || data.Hash}
Parent Hash: ${data.prevhash || data.PrevHash || 'N/A'}
Timestamp: ${new Date(data.timestamp * 1000).toLocaleString()}
Gas Limit: ${data.gaslimit || data.GasLimit || 'N/A'}
Gas Used: ${data.gasused || data.GasUsed || 'N/A'}
Transaction Count: ${data.transactions ? data.transactions.length : (data.Transactions ? data.Transactions.length : 0)}
Status: ${data.status || 'N/A'}
Coinbase: ${data.coinbaseaddr || data.CoinbaseAddr || 'N/A'}
                    `;
                    alert(details);
                })
                .catch(error => {
                    console.error('Error fetching block details:', error);
                    alert('Error loading block details');
                });
        }

        // Search functionality
        document.getElementById('addressSearch').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            // Implement search filtering here
        });

        document.getElementById('transactionSearch').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            // Implement search filtering here
        });

        document.getElementById('blockSearch').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            // Implement search filtering here
        });
    </script>
</body>
</html>
