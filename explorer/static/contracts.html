<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Contract Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { margin-bottom: 40px; }
        textarea { width: 100%; height: 300px; font-family: monospace; }
        .result { background: #f3f3f3; padding: 15px; border-radius: 5px; margin-top: 10px; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; margin-right: 5px; }
        .tab.active { background: #007bff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; }
        input, select { padding: 8px; margin: 5px 0; }
        label { display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Contract Manager</h1>
        
        <div class="tabs">
            <div class="tab active" data-tab="compile">Compile</div>
            <div class="tab" data-tab="deploy">Deploy</div>
            <div class="tab" data-tab="interact">Interact</div>
        </div>
        
        <div class="tab-content active" id="compile">
            <h2>Compile Contract</h2>
            <div>
                <label for="contractName">Contract Name:</label>
                <input type="text" id="contractName" placeholder="MyToken">
            </div>
            <div>
                <label for="sourceCode">Source Code:</label>
                <textarea id="sourceCode" placeholder="pragma solidity ^0.8.0;..."></textarea>
            </div>
            <button id="compileBtn">Compile</button>
            <div id="compileResult" class="result"></div>
        </div>
        
        <div class="tab-content" id="deploy">
            <h2>Deploy Contract</h2>
            <div>
                <label for="bytecode">Bytecode:</label>
                <textarea id="bytecode" placeholder="0x..."></textarea>
            </div>
            <div>
                <label for="abi">ABI:</label>
                <textarea id="abi" placeholder='[{"inputs":[],"name":"get",...}]'></textarea>
            </div>
            <div>
                <label for="from">From Address:</label>
                <input type="text" id="from" placeholder="0x...">
            </div>
            <div>
                <label for="value">Value (Wei):</label>
                <input type="text" id="value" placeholder="0">
            </div>
            <div>
                <label for="gasLimit">Gas Limit:</label>
                <input type="number" id="gasLimit" value="3000000">
            </div>
            <button id="deployBtn">Deploy</button>
            <div id="deployResult" class="result"></div>
        </div>
        
        <div class="tab-content" id="interact">
            <h2>Interact with Contract</h2>
            <div>
                <label for="contractAddress">Contract Address:</label>
                <input type="text" id="contractAddress" placeholder="0x...">
            </div>
            <div>
                <label for="contractAbi">Contract ABI:</label>
                <textarea id="contractAbi" placeholder='[{"inputs":[],"name":"get",...}]'></textarea>
            </div>
            <div>
                <label for="method">Method:</label>
                <select id="method"></select>
            </div>
            <div id="paramsContainer">
                <!-- Parameters will be added here dynamically -->
            </div>
            <div>
                <label for="callFrom">From Address:</label>
                <input type="text" id="callFrom" placeholder="0x...">
            </div>
            <div>
                <label for="callValue">Value (Wei):</label>
                <input type="text" id="callValue" placeholder="0">
            </div>
            <div>
                <label for="callGasLimit">Gas Limit:</label>
                <input type="number" id="callGasLimit" value="3000000">
            </div>
            <button id="callBtn">Call Method</button>
            <div id="callResult" class="result"></div>
        </div>
    </div>
    
    <script>
        // Tab switching logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
        
        // Compile contract
        document.getElementById('compileBtn').addEventListener('click', async () => {
            const name = document.getElementById('contractName').value;
            const sourceCode = document.getElementById('sourceCode').value;
            
            if (!name || !sourceCode) {
                alert('Contract name and source code are required');
                return;
            }
            
            try {
                const response = await fetch('/api/contract/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, source_code: sourceCode })
                });
                
                const result = await response.json();
                document.getElementById('compileResult').innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                
                // If compilation successful, populate deploy tab
                if (result && !result.error) {
                    const contractName = Object.keys(result)[0];
                    if (contractName) {
                        document.getElementById('bytecode').value = result[contractName].bytecode;
                        document.getElementById('abi').value = result[contractName].abi;
                    }
                }
            } catch (error) {
                document.getElementById('compileResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        });
        
        // Deploy contract
        document.getElementById('deployBtn').addEventListener('click', async () => {
            const bytecode = document.getElementById('bytecode').value;
            const abi = document.getElementById('abi').value;
            const from = document.getElementById('from').value;
            const value = document.getElementById('value').value;
            const gasLimit = parseInt(document.getElementById('gasLimit').value);
            
            if (!bytecode || !abi || !from) {
                alert('Bytecode, ABI, and From Address are required');
                return;
            }
            
            try {
                const response = await fetch('/api/contract/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        bytecode, 
                        abi, 
                        from, 
                        value: value || "0", 
                        gas_limit: gasLimit 
                    })
                });
                
                const result = await response.json();
                document.getElementById('deployResult').innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                
                // If deployment successful, populate interact tab
                if (result && result.contract_address) {
                    document.getElementById('contractAddress').value = result.contract_address;
                    document.getElementById('contractAbi').value = abi;
                    document.getElementById('callFrom').value = from;
                    
                    // Parse ABI and populate methods dropdown
                    populateMethodsDropdown(JSON.parse(abi));
                }
            } catch (error) {
                document.getElementById('deployResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        });
        
        // Populate methods dropdown when ABI changes
        document.getElementById('contractAbi').addEventListener('change', function() {
            try {
                const abi = JSON.parse(this.value);
                populateMethodsDropdown(abi);
            } catch (error) {
                console.error('Invalid ABI JSON:', error);
            }
        });
        
        // Method selection change
        document.getElementById('method').addEventListener('change', function() {
            try {
                const abi = JSON.parse(document.getElementById('contractAbi').value);
                const methodName = this.value;
                
                // Find the selected method in the ABI
                const method = abi.find(item => item.name === methodName);
                
                // Generate parameter inputs
                generateParameterInputs(method);
            } catch (error) {
                console.error('Error generating parameter inputs:', error);
            }
        });
        
        // Call contract method
        document.getElementById('callBtn').addEventListener('click', async () => {
            const contractAddress = document.getElementById('contractAddress').value;
            const abi = document.getElementById('contractAbi').value;
            const method = document.getElementById('method').value;
            const from = document.getElementById('callFrom').value;
            const value = document.getElementById('callValue').value;
            const gasLimit = parseInt(document.getElementById('callGasLimit').value);
            
            if (!contractAddress || !abi || !method || !from) {
                alert('Contract address, ABI, method, and from address are required');
                return;
            }
            
            // Collect parameters
            const paramInputs = document.querySelectorAll('.param-input');
            const params = Array.from(paramInputs).map(input => input.value);
            
            try {
                const response = await fetch('/api/contract/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contract_address: contractAddress, 
                        abi, 
                        method, 
                        from, 
                        value: value || "0", 
                        gas_limit: gasLimit,
                        params: JSON.stringify(params)
                    })
                });
                
                const result = await response.json();
                document.getElementById('callResult').innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('callResult').innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        });
        
        // Helper function to populate methods dropdown
        function populateMethodsDropdown(abi) {
            const methodSelect = document.getElementById('method');
            methodSelect.innerHTML = '';
            
            // Filter for functions (not constructor, events, etc)
            const functions = abi.filter(item => item.type === 'function');
            
            functions.forEach(func => {
                const option = document.createElement('option');
                option.value = func.name;
                
                // Format display name with parameters
                const params = func.inputs.map(input => `${input.type} ${input.name}`).join(', ');
                option.textContent = `${func.name}(${params})`;
                
                methodSelect.appendChild(option);
            });
            
            // Trigger change to generate parameter inputs for the first method
            if (functions.length > 0) {
                methodSelect.dispatchEvent(new Event('change'));
            }
        }
        
        // Helper function to generate parameter inputs
        function generateParameterInputs(method) {
            const container = document.getElementById('paramsContainer');
            container.innerHTML = '';
            
            if (!method || !method.inputs || method.inputs.length === 0) {
                container.innerHTML = '<p>No parameters required</p>';
                return;
            }
            
            method.inputs.forEach((input, index) => {
                const div = document.createElement('div');
                
                const label = document.createElement('label');
                label.textContent = `${input.name} (${input.type}):`;
                label.setAttribute('for', `param-${index}`);
                
                const inputElement = document.createElement('input');
                inputElement.type = 'text';
                inputElement.id = `param-${index}`;
                inputElement.className = 'param-input';
                inputElement.placeholder = input.type;
                
                div.appendChild(label);
                div.appendChild(inputElement);
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
