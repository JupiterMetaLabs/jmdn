services:
  postgres:
    image: postgres:15
    container_name: jmdn-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thebedb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thebedb}
      POSTGRES_DB: ${POSTGRES_DB:-thebedb_test}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thebedb -d thebedb_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: jmdn-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
