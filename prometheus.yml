global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "p2p_nodes"
    static_configs:
      - targets:
        - "localhost:8080"  # Your main node's metrics endpoint
        # Add additional nodes here as they come online
        # - "node2:8080"
        # - "node3:8080"
        # - "node4:8080"

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]