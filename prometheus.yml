global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "p2p_nodes"
    static_configs:
      - targets: ["localhost:8080"]
    metrics_path: /metrics

  - job_name: 'IMMUDB'
    static_configs:
      - targets: ['localhost:9497']
    metrics_path: /metrics

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]