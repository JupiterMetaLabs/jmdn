syntax = "proto3";

package proto;

option go_package = "Mempool/proto";

import "google/protobuf/empty.proto";

// Mempool service definition
service MempoolService {
  // Submit a single transaction to the mempool
  rpc SubmitTransaction(Transaction) returns (SubmitResponse);
  
  // Submit multiple transactions to the mempool
  rpc SubmitTransactions(TransactionBatch) returns (BatchSubmitResponse);
  
  // Get a specific transaction by hash
  rpc GetTransaction(GetTransactionRequest) returns (Transaction);
  
  // Get pending transactions with priority ordering
  rpc GetPendingTransactions(GetPendingRequest) returns (TransactionBatch);
  
  // Get mempool stats
  rpc GetMempoolStats(google.protobuf.Empty) returns (MempoolStats);
  
  // Get detailed fee statistics
  rpc GetFeeStatistics(google.protobuf.Empty) returns (FeeStatistics);
}

// Transaction represents a transaction in the mempool
message Transaction {
  string hash = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string type = 5;
  string timestamp = 6;
  string chain_id = 7;
  string nonce = 8;
  string gas_limit = 9;
  string max_fee = 10;
  string max_priority_fee = 11;
  string data = 12;
  string v = 14; // EIP-155 v value
  string r = 15;
  string s = 16; // EIP-155 r and s values
}

// TransactionBatch represents a batch of transactions
message TransactionBatch {
  repeated Transaction transactions = 1;
}

// SubmitResponse is the response for submitting a transaction
message SubmitResponse {
  bool success = 1;
  string hash = 2;
  string error = 3;
}

// BatchSubmitResponse is the response for submitting multiple transactions
message BatchSubmitResponse {
  bool success = 1;
  int32 count = 2;
  repeated string hashes = 3;
  string error = 4;
}

// GetTransactionRequest is used to request a specific transaction
message GetTransactionRequest {
  string hash = 1;
}

// GetPendingRequest is used to request pending transactions
message GetPendingRequest {
  int32 limit = 1;
}

// MempoolStats contains basic mempool statistics
message MempoolStats {
  int32 queue_count = 1;
  int32 db_count = 2;
  string merkle_root = 3;
}

// FeeStatistics contains comprehensive fee analysis data
message FeeStatistics {
  uint64 min_fee = 1;
  uint64 max_fee = 2;
  uint64 median_fee = 3;
  uint64 mean_fee = 4;
  map<string, int32> fee_distribution = 5;
  double priority_fee_ratio = 6;
  map<string, FeeByType> fee_by_tx_type = 7;
  repeated FeeTimepoint historical_trend = 8;
  RecommendedFees recommended_fees = 9;
}

// FeeByType contains fee statistics for a specific transaction type
message FeeByType {
  int32 count = 1;
  uint64 mean = 2;
  uint64 max = 3;
}

// FeeTimepoint represents a point in fee history
message FeeTimepoint {
  string timestamp = 1;
  uint64 mean_fee = 2;
  int32 count = 3;
}

// RecommendedFees contains recommended fee levels
message RecommendedFees {
  uint64 slow = 1;      // ~10min confirmation
  uint64 standard = 2;  // ~3min confirmation
  uint64 fast = 3;      // ~30sec confirmation
  uint64 instant = 4;   // Next block
}

