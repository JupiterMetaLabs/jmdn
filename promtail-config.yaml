server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: p2p_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: p2p_logs
          __path__: /var/log/p2p/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: time
            component: component
            message: message
            peer_id: peer_id
      - labels:
          level:
          component:
          peer_id:
