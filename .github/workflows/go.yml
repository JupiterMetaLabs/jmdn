name: Go

on:
  push:
    branches: [ "Mainnet" ]
    tags: [ 'v*.*.*' ]  # Only create release on version tags like v1.0.0
  pull_request:
    branches: [ "Mainnet" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.9'

    - name: Build
      run: go build -v ./...

    # - name: Test
    #   run: go test -v ./...

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.9'

    - name: Cross-compile for Linux amd64
      run: GOOS=linux GOARCH=amd64 go build -o myapp-linux-amd64 ./...

    - name: Cross-compile for Linux arm64
      run: GOOS=linux GOARCH=arm64 go build -o myapp-linux-arm64 ./...

    - name: Cross-compile for macOS amd64
      run: GOOS=darwin GOARCH=amd64 go build -o myapp-macos-amd64 ./...

    - name: Cross-compile for macOS arm64
      run: GOOS=darwin GOARCH=arm64 go build -o myapp-macos-arm64 ./...

    - name: Cross-compile for Windows amd64
      run: GOOS=windows GOARCH=amd64 go build -o myapp-windows-amd64.exe ./...

    - name: Cross-compile for Windows arm64
      run: GOOS=windows GOARCH=arm64 go build -o myapp-windows-arm64.exe ./...

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          JMZKDecentralisedNetwork-linux-amd64
          JMZKDecentralisedNetwork-linux-arm64
          JMZKDecentralisedNetwork-macos-amd64
          JMZKDecentralisedNetwork-macos-arm64
          JMZKDecentralisedNetwork-windows-amd64.exe
          JMZKDecentralisedNetwork-windows-arm64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
