name: Go
on:
  push:
    branches: [ "Mainnet" ]
  pull_request:
    branches: [ "Mainnet" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.9'

      - name: Build
        run: go build -v .

  release-linux-windows:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.9'

      - name: Cross-compile for Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o JMZKDecentralisedNetwork-linux-amd64 .

      - name: Cross-compile for Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o JMZKDecentralisedNetwork-linux-arm64 .

      - name: Cross-compile for Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o JMZKDecentralisedNetwork-windows-amd64.exe .

      - name: Cross-compile for Windows arm64
        run: GOOS=windows GOARCH=arm64 go build -o JMZKDecentralisedNetwork-windows-arm64.exe .

      - name: Upload Linux & Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows-binaries
          path: |
            JMZKDecentralisedNetwork-linux-*
            JMZKDecentralisedNetwork-windows-*

  release-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.9'

      - name: Cross-compile for macOS arm64
        env:
          CGO_ENABLED: 1
        run: GOARCH=arm64 go build -o JMZKDecentralisedNetwork-macos-arm64 .

      - name: Cross-compile for macOS amd64
        env:
          CGO_ENABLED: 1
        run: GOARCH=amd64 go build -o JMZKDecentralisedNetwork-macos-amd64 .

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: JMZKDecentralisedNetwork-macos-*

  create-release:
    needs: [release-linux-windows, release-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-windows-binaries
          path: ./bin

      - uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: ./bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./bin/**
          tag_name: JMDT-Decentralised-Node-mainnet-release-${{ github.sha }}
          name: JMDT-Decentralised-Node-`${{ github.sha }}`
          body: |
            This is an automated release for commit `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
